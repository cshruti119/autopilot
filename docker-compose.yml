services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
      - "8080:8080"  # For RedisInsight

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aifsd
      POSTGRES_PASSWORD: aifsd
      POSTGRES_DB: aifsd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: